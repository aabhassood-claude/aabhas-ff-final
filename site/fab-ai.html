<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fab AI — The creative engine for scroll-stopping ads.</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ff-cream); }
  body { font-family: var(--font-sans); color: var(--fg-1); }
  * { box-sizing: border-box; }
  a { color: inherit; }
  h1, h2, h3, h4 { margin: 0; }
  button { font-family: inherit; }
  @keyframes ffFadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  /* Entrance — pairs with the SiteHeader Fab AI handoff overlay */
  @keyframes ffaiPageEnter {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #root { animation: ffaiPageEnter .55s var(--ease-out) both; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Logo.jsx"></script>
<script type="text/babel" src="FabAIKit.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <div data-screen-label="06 Fab AI">
        <FabAINav/>
        <FabAIHero/>
        <FabAIStats/>
        <FabAIFeatures/>
        <FabAICompare/>
        <GrowthCrossLink/>
        <FabAIFAQ/>
        <FabAIFinalCTA/>
        <FabAIFooter/>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
