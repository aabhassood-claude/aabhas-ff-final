<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FabFunnel × MAC2026 — Catch Rohit & Sahil live in Yerevan.</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ff-ink); }
  body { font-family: var(--font-sans); color: var(--ff-paper); }
  * { box-sizing: border-box; }
  a { color: inherit; }
  h1, h2, h3, h4 { margin: 0; }
  button { font-family: inherit; }
  @keyframes ffFadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  /* Custom scrollbar to match dark surface */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #0F0F0D; }
  ::-webkit-scrollbar-thumb { background: #2A2A26; border-radius: 999px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Logo.jsx"></script>
<script type="text/babel" src="Mac2026Content.jsx"></script>
<script type="text/babel" src="Mac2026Kit.jsx"></script>

<script type="text/babel">
  // Minimal dark nav for the MAC page — no MegaMenu noise here.
  // Just FabFunnel mark on the left + a single CTA back to the main site.
  function MacNav() {
    const M = window.MAC2026;
    const [scrolled, setScrolled] = React.useState(false);
    React.useEffect(() => {
      const on = () => setScrolled(window.scrollY > 8);
      on();
      window.addEventListener('scroll', on, { passive: true });
      return () => window.removeEventListener('scroll', on);
    }, []);
    return (
      <header style={{ position: 'sticky', top: 0, zIndex: 90 }}>
        <nav style={{
          background: scrolled ? 'rgba(15,15,12,0.82)' : 'rgba(15,15,12,0.5)',
          backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
          borderBottom: scrolled ? '1px solid rgba(255,255,255,0.08)' : '1px solid transparent',
          transition: 'background .25s, border-color .25s',
        }}>
          <div style={{
            maxWidth: 1340, margin: '0 auto', padding: '0 20px',
            height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 14,
          }}>
            <a href="landing.html" style={{ textDecoration: 'none', flexShrink: 0 }}>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
                <FFLockup height={18} fab="#FFFFFF" fun="var(--ff-lime)"/>
                <span style={{
                  padding: '4px 10px', borderRadius: 6,
                  background: 'var(--accent-mac-purple)', color: '#fff',
                  fontFamily: "'Geist Mono'", fontSize: 9.5, fontWeight: 700,
                  letterSpacing: '0.18em', textTransform: 'uppercase',
                }}>MAC2026</span>
              </span>
            </a>
            <a href={M.links.fabAi} style={{ textDecoration: 'none' }}>
              <button style={{
                padding: '10px 16px 10px 20px', borderRadius: 10, border: 'none',
                background: 'var(--ff-lime)', color: 'var(--ff-ink)',
                fontFamily: "'Geist'", fontWeight: 700, fontSize: 14, cursor: 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 9,
                boxShadow: '0 12px 28px -10px rgba(195,235,66,0.55)',
                whiteSpace: 'nowrap',
              }}>
                Try FabAI
                <span style={{ background: 'var(--ff-ink)', color: 'var(--ff-lime)',
                  width: 22, height: 22, borderRadius: 5,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 12 }}>›</span>
              </button>
            </a>
          </div>
        </nav>
      </header>
    );
  }

  // Minimal footer — dark, on-theme, no kitchen sink. The full
  // SiteFooter is cream-themed and would clash here.
  function MacFooter() {
    const M = window.MAC2026;
    return (
      <footer style={{
        background: '#0F0F0D', borderTop: '1px solid rgba(255,255,255,0.06)', padding: '32px 24px',
      }}>
        <div style={{
          maxWidth: 1280, margin: '0 auto',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          gap: 18, flexWrap: 'wrap',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <FFLockup height={16} fab="#FFFFFF" fun="var(--ff-lime)"/>
            <span style={{ padding: '3px 8px', borderRadius: 4, background: 'var(--accent-mac-purple)', color: '#fff', fontFamily: "'Geist Mono'", fontSize: 9, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase' }}>MAC2026</span>
          </div>
          <div style={{ display: 'flex', gap: 22, fontFamily: "'Geist'", fontSize: 13, color: 'rgba(255,255,255,0.5)' }}>
            <a href="landing.html"     style={{ color: 'inherit', textDecoration: 'none' }}>FabFunnel</a>
            <a href={M.links.fabAi}    style={{ color: 'inherit', textDecoration: 'none' }}>FabAI</a>
            <a href="pricing.html"     style={{ color: 'inherit', textDecoration: 'none' }}>Pricing</a>
          </div>
          <div style={{ fontFamily: "'Geist'", fontSize: 13, color: 'rgba(255,255,255,0.35)' }}>© 2026 FabFunnel</div>
        </div>
      </footer>
    );
  }

  function App() {
    return (
      <div data-screen-label="07 MAC2026">
        <MacNav/>
        <MacHero/>
        <MacSession/>
        <MeetFabAI/>
        <CompleteSuite/>
        <MacNewsletter/>
        <MacFooter/>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
